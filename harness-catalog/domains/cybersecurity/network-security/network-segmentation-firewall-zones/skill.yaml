      - lateral-movement
      - data-loss
      - compliance-fines
  skill_value:
    - "Требует явных least-privilege правил источник->назначение->порт."
    - "Запрещает any-any правила."
    - "Делает аудит правил предсказуемым для нон-эксперта."
  frameworks:
    nist_sp:
      - "NIST SP 800-125"
      - "NIST SP 800-53"
    nist_csf:
      - PR.IR-01
      - DE.CM-01
